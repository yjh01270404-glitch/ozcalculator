<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>계산기 서비스</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container py-5">
      <div class="calculator-wrap mx-auto">
        <h2 class="text-center mb-4">계산기 서비스</h2>

        <div id="display" class="display text-end mb-2">0</div>
        <div id="result" class="alert d-none mb-2"></div>

        <div class="btn-grid">
          <button class="btn btn-number" onclick="appendNumber('7')">7</button>
          <button class="btn btn-number" onclick="appendNumber('8')">8</button>
          <button class="btn btn-number" onclick="appendNumber('9')">9</button>
          <button class="btn btn-operator" onclick="setOperator('/')">÷</button>

          <button class="btn btn-number" onclick="appendNumber('4')">4</button>
          <button class="btn btn-number" onclick="appendNumber('5')">5</button>
          <button class="btn btn-number" onclick="appendNumber('6')">6</button>
          <button class="btn btn-operator" onclick="setOperator('*')">×</button>

          <button class="btn btn-number" onclick="appendNumber('1')">1</button>
          <button class="btn btn-number" onclick="appendNumber('2')">2</button>
          <button class="btn btn-number" onclick="appendNumber('3')">3</button>
          <button class="btn btn-operator" onclick="setOperator('-')">−</button>

          <button class="btn btn-number" onclick="appendNumber('0')">0</button>
          <button class="btn btn-clear" onclick="clearAll()">C</button>
          <button class="btn btn-equals" onclick="calculate()">=</button>
          <button class="btn btn-operator" onclick="setOperator('+')">+</button>
        </div>

        <div class="extra-btns mt-2 d-flex gap-2">
          <button class="btn btn-extra flex-fill" onclick="appendDot()">
            .
          </button>
          <button class="btn btn-extra flex-fill" onclick="backspace()">
            ⌫
          </button>
          <button class="btn btn-extra flex-fill" onclick="squareRoot()">
            √
          </button>
          <button class="btn btn-extra flex-fill" onclick="square()">x²</button>
        </div>

        <div class="history-box mt-3">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <span class="history-title">계산 기록</span>
            <button
              class="btn btn-sm btn-outline-secondary"
              onclick="clearHistory()"
            >
              기록 삭제
            </button>
          </div>
          <ul id="history-list" class="history-list"></ul>
        </div>
      </div>
    </div>
    <script src="calculator.js"></script>
  </body>
</html>
